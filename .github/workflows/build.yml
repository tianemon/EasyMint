name: Build & Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS-arm64
          - os: windows-latest
            name: Windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Prune non-platform SDK binaries
        shell: bash
        run: |
          KEEP="claude-agent-sdk"
          if [ "$RUNNER_OS" = "macOS" ]; then KEEP="darwin"; fi
          if [ "$RUNNER_OS" = "Windows" ]; then KEEP="win32"; fi
          for dir in node_modules/@anthropic-ai/claude-agent-sdk-*; do
            [ -d "$dir" ] || continue
            case "$dir" in
              *"$KEEP"*) echo "[keep] $dir" ;;
              *) echo "[remove] $dir"; rm -rf "$dir" ;;
            esac
          done

      - name: Build
        run: npm run build:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easymint-${{ matrix.name }}
          path: dist-electron/*.*
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: easymint-*/*
          generate_release_notes: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
