name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS-arm64
          - os: windows-latest
            name: Windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Prune non-platform SDK binaries
        shell: bash
        run: |
          KEEP="claude-agent-sdk"
          if [ "$RUNNER_OS" = "macOS" ]; then KEEP="darwin"; fi
          if [ "$RUNNER_OS" = "Windows" ]; then KEEP="win32"; fi
          for dir in node_modules/@anthropic-ai/claude-agent-sdk-*; do
            [ -d "$dir" ] || continue
            case "$dir" in
              *"$KEEP"*) echo "[keep] $dir" ;;
              *) echo "[remove] $dir"; rm -rf "$dir" ;;
            esac
          done

      - name: Import Apple Code Signing Certificate (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 -d > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed 's/"//g')
          rm /tmp/cert.p12

      - name: Build
        run: npm run build:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'true' || 'false' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: easymint-${{ matrix.name }}
          path: dist-electron/*.*
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          digest-mismatch: warn

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          awk -v ver="$TAG_NAME" '
            $0 ~ "^## " ver { found=1; next }
            found && $0 ~ "^## " { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          files: |
            easymint-*/*.dmg
            easymint-*/*.dmg.blockmap
            easymint-*/*.exe
            easymint-*/*.exe.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
